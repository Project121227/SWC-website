<section id="hero" class="hero">
  <div class="hero-left">
    <div class="content">
      <h1 class="headline" @staggerReveal>
        @for (word of headlineWords; track $index) {
          <span class="word">{{ word }}</span>
        }
      </h1>
      
      <p class="subtext">
        Osteopathic care rooted in understanding your body's language.
      </p>

      <div class="cta-group">
        <button class="btn-primary" (click)="scrollToSection('contact')">Book a Session</button>
        <button class="btn-outline" (click)="scrollToSection('about')">Learn More</button>
      </div>

      <div class="badge" @fadeUpBadge>
        <span class="dot"></span> Est. Nellore &middot; Andhra Pradesh
      </div>
    </div>
  </div>

  <div class="hero-right">
    <!-- Unsplash placeholder for wellness space -->
    <img src="https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?w=900" alt="Wellness space at Sattvaa wellness center" loading="lazy">
    <div class="diagonal-overlay"></div>
  </div>
</section>
