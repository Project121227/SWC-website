<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="nav-container container">
    
    <div class="brand" (click)="scrollToSection('hero')">
      <img class="brand-logo" src="assets/sattva.png" alt="Sattvaa wellness center logo">
      <div class="brand-text">
        <h1 class="logo">Sattvaa wellness center</h1>
        <span class="tagline">touching the roots</span>
      </div>
    </div>

    <!-- Desktop Menu -->
    <div class="desk-menu">
      <a (click)="scrollToSection('hero')">Home</a>
      <a (click)="scrollToSection('about')">About</a>
      <a (click)="scrollToSection('services')">Services</a>
      <a (click)="scrollToSection('why-us')">Why Us</a>
      <a (click)="scrollToSection('testimonials')">Testimonials</a>
      <a (click)="scrollToSection('contact')">Contact</a>

    <!-- Mobile Hamburger Toggle -->
    <button class="hamburger" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen" aria-label="Toggle menu">

      <div class="line"></div>

  <!-- Mobile Drawer -->
  <div class="mobile-drawer" [class.open]="isMobileMenuOpen">
    <div class="mobile-links">
      <a (click)="scrollToSection('hero')">Home</a>
      <a (click)="scrollToSection('about')">About</a>
      <a (click)="scrollToSection('services')">Services</a>
      <a (click)="scrollToSection('why-us')">Why Us</a>
      <a (click)="scrollToSection('testimonials')">Testimonials</a>
      <a (click)="scrollToSection('contact')">Contact</a>
